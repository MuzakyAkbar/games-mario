<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>🍄 Super Nusa Bros</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;font-family:'Press Start 2P',monospace}

#wrapper{position:relative;width:768px;max-width:100vw}

/* ─── HUD ─── */
#hud{
  background:linear-gradient(135deg,#1a0a3a 0%,#2d1060 100%);
  border:3px solid #6a2fd4;border-bottom:none;
  padding:8px 16px;display:flex;justify-content:space-between;align-items:center;
  font-size:9px;color:#ffd700;
}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:3px}
.hud-label{color:#a070ff;font-size:7px;letter-spacing:1px}
.hud-val{color:#ffd700;font-size:10px}

/* ─── CANVAS ─── */
#canvasBox{
  position:relative;line-height:0;overflow:hidden;
  border:3px solid #6a2fd4;border-top:none;border-bottom:none;
}
canvas{display:block;width:100%;image-rendering:pixelated;image-rendering:crisp-edges}

/* ─── OVERLAY ─── */
.ov{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
  background:rgba(0,0,20,.88);backdrop-filter:blur(3px);z-index:50;
}
.ov.hide{display:none}
.ov-logo{font-size:clamp(14px,3.5vw,26px);color:#ffd700;text-align:center;line-height:1.7;text-shadow:3px 3px 0 #c84b0c,6px 6px 0 #000}
.ov-sub{font-size:clamp(6px,1.2vw,9px);color:#ccc;text-align:center;line-height:2.2;max-width:340px}
.ov-btn{
  background:#e8b000;color:#000;border:none;font-family:'Press Start 2P',monospace;
  font-size:clamp(7px,1.5vw,11px);padding:11px 26px;cursor:pointer;
  border-bottom:4px solid #8a6000;border-right:4px solid #8a6000;
  transition:transform .1s,box-shadow .1s;
}
.ov-btn:hover{transform:scale(1.05)}
.ov-btn:active{transform:scale(.95);margin-top:3px;border-width:2px}
.ov-score{font-size:clamp(9px,1.8vw,13px);color:#fff;text-align:center}

/* ─── MOBILE CONTROLS ─── */
#ctrl{
  background:linear-gradient(135deg,#1a0a3a,#0a0020);
  border:3px solid #6a2fd4;border-top:none;
  padding:10px 16px;display:flex;justify-content:space-between;align-items:center;
}
.ctrl-grp{display:flex;gap:8px;align-items:center}
.cbtn{
  width:48px;height:48px;border-radius:10px;
  background:rgba(255,215,0,.12);border:2px solid rgba(255,215,0,.35);
  display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;
  touch-action:manipulation;transition:background .1s,transform .1s;
}
.cbtn:active,.cbtn.on{background:rgba(255,215,0,.3);transform:scale(.91)}
.cbtn.jump{width:58px;height:58px;border-radius:50%;background:rgba(255,80,80,.18);border-color:rgba(255,100,100,.45);font-size:22px}
.cbtn.jump:active,.cbtn.jump.on{background:rgba(255,80,80,.38)}
</style>
</head>
<body>
<div id="wrapper">

  <!-- HUD -->
  <div id="hud">
    <div class="hud-item"><div class="hud-label">SKOR</div><div class="hud-val" id="hSkor">000000</div></div>
    <div class="hud-item"><div class="hud-label">KOIN</div><div class="hud-val" id="hKoin">🪙 00</div></div>

    {x:24,y:9,t:'p'},{x:25,y:9,t:'P'},{x:24,y:10,t:'ps'},{x:25,y:10,t:'Ps'},{x:24,y:11,t:'ps'},{x:25,y:11,t:'Ps'},
    {x:28,y:8,t:'b'},{x:29,y:8,t:'b'},{x:30,y:8,t:'q',item:'mush'},{x:31,y:8,t:'b'},{x:32,y:8,t:'b'},
    {x:35,y:6,t:'b'},{x:36,y:6,t:'q',item:'coin'},{x:37,y:6,t:'b'},{x:38,y:6,t:'q',item:'coin'},{x:39,y:6,t:'b'},
    {x:36,y:9,t:'b'},{x:37,y:9,t:'b'},

    // stairs
    {x:51,y:11,t:'s'},{x:52,y:10,t:'s'},{x:52,y:11,t:'s'},{x:53,y:9,t:'s'},{x:53,y:10,t:'s'},{x:53,y:11,t:'s'},
    {x:54,y:8,t:'s'},{x:54,y:9,t:'s'},{x:54,y:10,t:'s'},{x:54,y:11,t:'s'},
    {x:55,y:7,t:'s'},{x:55,y:8,t:'s'},{x:55,y:9,t:'s'},{x:55,y:10,t:'s'},{x:55,y:11,t:'s'},
    {x:56,y:7,t:'s'},{x:56,y:8,t:'s'},{x:56,y:9,t:'s'},{x:56,y:10,t:'s'},{x:56,y:11,t:'s'},
  ],

    {x:27,y:11,t:'K'},{x:33,y:11,t:'G'},{x:39,y:11,t:'K'},{x:44,y:11,t:'G'},{x:48,y:11,t:'K'},

function R(x0,x1,y,t){ const a=[];for(let x=x0;x<x1;x++) a.push({x,y,t});return a; }

/* ═══════════════════════════════════════════════
   GAME STATE
═══════════════════════════════════════════════ */
let gState='start', lvIdx=0, score=0, coins_=0, lives=3, timer_=300;
let camX=0, frame=0, raf=null, timerTick=null;

// objects
let player, tiles, enemies, freeCoins, qBlocks, powerups, particles, floatTexts;
let flagX=0, flagCaught=false;

const keys={l:false,r:false,u:false,d:false};
let jumpConsumed=false;

/* ═══════════════════════════════════════════════
   INIT LEVEL
═══════════════════════════════════════════════ */
function initLevel(){
  const L=LEVELS[lvIdx];
  camX=0; frame=0; flagCaught=false;

  player={
    x:2*T, y:10*T, w:26, h:30,
    vx:0, vy:0, onGround:false,
    dir:1, big:false, inv:0, dead:false, deadT:0,
    wf:0, wt:0,
  };

  tiles=[];
  for(const td of L.tiles){
    const solid = !['p','P','ps','Ps'].includes(td.t) ? true : true; // pipes block too
    tiles.push({x:td.x*T,y:td.y*T,w:T,h:T,t:td.t,item:td.item||null,hit:false,bumpT:0});
  }

  enemies=L.enemies.map(e=>({
    x:e.x*T, y:e.y*T-2, w:26, h:26,
    t:e.t, vx:-1.1, vy:0, onGround:false,
    dead:false, squish:false, dt:0, wf:0, wt:0,
  }));

  freeCoins=L.freeCoins.map(fc=>({
    x:fc.x*T+T/2-8, y:fc.y*T, w:16, h:20, got:false, anim:0,
  }));

  powerups=[];
  particles=[];
  floatTexts=[];
  flagX=L.flag*T;
  timer_=300;
  updateHUD();
}

/* ═══════════════════════════════════════════════
   GAME LOOP
═══════════════════════════════════════════════ */
function loop(){
  raf=requestAnimationFrame(loop);
  if(gState!=='play'){ drawScene(); return; }
  frame++;
  update();
  drawScene();
}

/* ═══════════════════════════════════════════════
   UPDATE
═══════════════════════════════════════════════ */
const GR=0.55, JFORCE=-13.5, SPD=4;

function update(){
  // ── Player dead animation ──
  if(player.dead){
    player.deadT--;
    player.vy+=0.45;
    player.y+=player.vy;
    if(player.deadT<=0){
      lives--;
      if(lives<=0){ endGame('over'); return; }
      initLevel(); gState='play'; flashLevel();
    }
    return;
  }
  if(player.inv>0) player.inv--;

  // ── Movement ──
  if(keys.l){ player.vx=Math.max(player.vx-1,-SPD); player.dir=-1; }
  else if(keys.r){ player.vx=Math.min(player.vx+1, SPD); player.dir=1; }
  else { player.vx*=0.78; }

  // walk frame
  player.wt++;
  if(Math.abs(player.vx)>0.5 && player.onGround){
    if(player.wt>7){player.wt=0;player.wf=(player.wf+1)%3;}
  } else { player.wf=0; }

  // ── Physics ──
  player.vy=Math.min(player.vy+GR,16);
  player.x+=player.vx;
  const L=LEVELS[lvIdx];
  player.x=Math.max(0,Math.min(player.x,L.w*T-player.w));
  colX(player);
  player.y+=player.vy;
  player.onGround=false;
  colY(player, true);

  // pit death
  if(player.y>H+80) killPlayer();

  // ── Camera ──
  const tgt=Math.max(0,Math.min(player.x-W*0.33, L.w*T-W));
  camX+=(tgt-camX)*0.2;

  // ── Free coins ──
  for(const fc of freeCoins){
    if(fc.got) continue;
    fc.anim+=0.1;
    if(overlap(player,{x:fc.x,y:fc.y,w:fc.w,h:fc.h})){
      fc.got=true; coins_++; score+=200;
      spawnFT(fc.x,fc.y,'+200','#ffd700');
      spawnParts(fc.x+8,fc.y,C.co,5);
    }
  }

  // ── Powerups ──
  for(const pu of powerups){
    if(!pu.active) continue;
    pu.vy=Math.min(pu.vy+GR,14);
    pu.x+=pu.vx;
    colX(pu);
    if(pu.hitWall) pu.vx*=-1;
    pu.y+=pu.vy;
    colY(pu,false);
    if(pu.y>H+80){pu.active=false;continue;}
    if(overlap(player,pu)){
      pu.active=false;
      if(pu.t==='mush'){
        if(!player.big){player.big=true;player.h=48;player.y-=18;}
        score+=1000; spawnFT(pu.x,pu.y,'+1000','#f84'); spawnParts(pu.x,pu.y,C.mr,8);
      }
    }
  }

  // ── Enemies ──
  for(const e of enemies){
    if(e.dead) continue;
    if(e.squish){e.dt--;if(e.dt<=0)e.dead=true;continue;}
    e.vy=Math.min(e.vy+GR,14);
    e.x+=e.vx;
    colX(e);
    if(e.hitWall) e.vx*=-1;
    e.y+=e.vy;
    e.onGround=false;
    colY(e,false);
    if(e.y>H+60){e.dead=true;continue;}
    e.wt++;
    if(e.wt>10){e.wt=0;e.wf=(e.wf+1)%2;}

    // player-enemy collision
    if(!player.inv && overlap(player,{x:e.x,y:e.y,w:e.w,h:e.h})){
      const pBot=player.y+player.h, eMid=e.y+e.h/2;
      if(pBot<eMid+12 && player.vy>0){
        // stomp
        e.squish=true; e.dt=45; e.h=12; e.y+=14;
        player.vy=-9; score+=100;
        spawnFT(e.x+e.w/2,e.y,'+100','#fff'); spawnParts(e.x+e.w/2,e.y,C.gb,6);
      } else {
        if(player.big){player.big=false;player.h=30;player.inv=100;}
        else killPlayer();
      }
    }
  }

  // ── Block bump from below ──
  for(const tl of tiles){
    if(tl.t!=='b'&&tl.t!=='q') continue;
    if(tl.bumpT>0)tl.bumpT--;
    if(tl.hit) continue;
    const underHit=player.x<tl.x+tl.w&&player.x+player.w>tl.x&&
                   Math.abs(player.y-(tl.y+tl.h))<5 && player.vy<0;
    if(underHit){
      tl.bumpT=8;
      if(tl.t==='q'){
        tl.hit=true;
        if(tl.item==='coin'){score+=200;coins_++;spawnFT(tl.x+T/2,tl.y,'+200','#ffd700');spawnParts(tl.x+T/2,tl.y,C.co,5);}
        else if(tl.item==='mush'){
          powerups.push({x:tl.x,y:tl.y-T,w:26,h:26,t:'mush',active:true,vx:1.2,vy:-5,onGround:false,hitWall:false});
        }
      } else if(tl.t==='b' && player.big){
        tl.t='broken'; spawnParts(tl.x+T/2,tl.y+T/2,C.br,8); score+=50;
      }
    }
  }

  // ── Flag ──
  if(!flagCaught){
    const fRect={x:flagX,y:11*T-9*T,w:8,h:9*T};
    if(overlap(player,fRect)){
      flagCaught=true; score+=1000;
      setTimeout(()=>{
        if(lvIdx>=LEVELS.length-1){ endGame('win'); }
        else { endGame('clear'); }
      },900);
    }
  }

  // ── Particles & float texts ──
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.28;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
  for(let i=floatTexts.length-1;i>=0;i--){
    const ft=floatTexts[i];ft.y-=0.9;ft.life--;
    if(ft.life<=0)floatTexts.splice(i,1);
  }

  updateHUD();
}

/* ═══════════════════════════════════════════════
   COLLISION
═══════════════════════════════════════════════ */
function solidTiles(){ return tiles.filter(t=>t.t!=='broken'); }

function colX(obj){
  obj.hitWall=false;
  for(const tl of solidTiles()){
    if(!overlap(obj,tl)) continue;
    if(obj.vx>0){obj.x=tl.x-obj.w;obj.hitWall=true;}
    else if(obj.vx<0){obj.x=tl.x+tl.w;obj.hitWall=true;}
    obj.vx=0;
  }
}
function colY(obj, isPlayer){
  for(const tl of solidTiles()){
    if(!overlap(obj,tl)) continue;
    if(obj.vy>0){obj.y=tl.y-obj.h;obj.vy=0;obj.onGround=true;if(isPlayer)player.onGround=true;}
    else if(obj.vy<0){obj.y=tl.y+tl.h;obj.vy=0;}
  }
}
function overlap(a,b){
  return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;
}

/* ═══════════════════════════════════════════════
   KILL PLAYER
═══════════════════════════════════════════════ */
function killPlayer(){
  if(player.dead||player.inv>0) return;
  player.dead=true; player.deadT=80; player.vy=JFORCE*0.9;
}

/* ═══════════════════════════════════════════════
   PARTICLES & FLOAT TEXTS
═══════════════════════════════════════════════ */
function spawnParts(x,y,color,n){
  for(let i=0;i<n;i++){
    particles.push({x,y,vx:(Math.random()-0.5)*5,vy:-2-Math.random()*3,life:20+Math.random()*12,color,r:3+Math.random()*3});
  }
}
function spawnFT(x,y,txt,col){
  floatTexts.push({x:x-camX,y:y,txt,col,life:50});
}

/* ═══════════════════════════════════════════════
   DRAW SCENE
═══════════════════════════════════════════════ */
function drawScene(){
  const L=LEVELS[lvIdx];

  // Background
  const bg=cx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,L.bgTop);bg.addColorStop(1,L.bgBot);
  cx.fillStyle=bg;cx.fillRect(0,0,W,H);

  // Clouds (parallax)
  for(const [gx,gy] of L.clouds){
    const sx=gx*T - camX*0.4;
    if(sx<-100||sx>W+100) continue;
    drawCloud(sx, gy*T+10);
  }

  cx.save();
  cx.translate(-Math.floor(camX),0);

  // Tiles
  for(const tl of tiles) drawTile(tl);

  // Free coins
  for(const fc of freeCoins) if(!fc.got) drawFreeCoin(fc);

  // Powerups
  for(const pu of powerups) if(pu.active) drawMushroom(pu.x,pu.y);

  // Enemies
  for(const e of enemies) if(!e.dead) drawEnemy(e);

  // Flag & pole
  drawFlag();

  // Player
  if(!player.dead||(Math.floor(player.deadT/5)%2===0)) drawPlayer();

  // Particles
  for(const p of particles){
    cx.globalAlpha=p.life/30;
    cx.fillStyle=p.color;
    cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill();
    cx.globalAlpha=1;
  }

  cx.restore();

  // Float texts (screen space)
  for(const ft of floatTexts){
    cx.globalAlpha=ft.life/50;
    cx.fillStyle=ft.col;
    cx.font='bold 9px "Press Start 2P",monospace';
    cx.textAlign='center';
    cx.fillText(ft.txt,ft.x,ft.y);
    cx.globalAlpha=1;
  }
  cx.textAlign='left';
}

/* ── CLOUD ── */
function drawCloud(x,y){
  cx.fillStyle=C.cl;
  cx.beginPath();
  cx.arc(x+20,y+2,14,0,Math.PI*2);
  cx.arc(x+36,y-6,18,0,Math.PI*2);
  cx.arc(x+54,y+2,14,0,Math.PI*2);
  cx.fill();
  cx.fillRect(x+6,y+2,62,14);
  cx.fillStyle=C.cls;
  cx.fillRect(x+6,y+14,62,3);
}

/* ── TILE ── */
function drawTile(tl){
  if(tl.t==='broken') return;
  const bmp=(tl.bumpT>0)?-tl.bumpT*0.6:0;
  const tx=Math.floor(tl.x), ty=Math.floor(tl.y+bmp);

  if(tl.t==='g'){
    // ground
    cx.fillStyle=C.gt; cx.fillRect(tx,ty,T,5);
    cx.fillStyle=C.gs; cx.fillRect(tx,ty+5,T,T-5);
    cx.fillStyle=C.gd;
    cx.fillRect(tx+2,ty+7,5,4);cx.fillRect(tx+12,ty+10,4,3);cx.fillRect(tx+22,ty+7,5,4);
  } else if(tl.t==='b'){
    cx.fillStyle=C.br; cx.fillRect(tx,ty,T,T);
    cx.fillStyle=C.brl;
    cx.fillRect(tx,ty+T/2-1,T,2);
    cx.fillRect(tx+T/2-1,ty,2,T/2);
    cx.fillRect(tx+T*0.25,ty+T/2+1,2,T/2-1);
    cx.fillRect(tx+T*0.75,ty+T/2+1,2,T/2-1);
    cx.fillStyle='rgba(255,255,255,.15)';cx.fillRect(tx,ty,T,3);
    cx.fillStyle='rgba(0,0,0,.2)';cx.fillRect(tx,ty+T-3,T,3);
  } else if(tl.t==='q'){
    if(tl.hit){
      cx.fillStyle=C.qbd;cx.fillRect(tx,ty,T,T);
      cx.fillStyle='rgba(0,0,0,.3)';cx.fillRect(tx,ty+T-3,T,3);
    } else {
      cx.fillStyle=C.qb;cx.fillRect(tx,ty,T,T);
      cx.fillStyle=C.qbs;cx.fillRect(tx+2,ty+2,T-4,5);cx.fillRect(tx+2,ty+2,5,T-4);
      cx.fillStyle=C.qbd;cx.fillRect(tx,ty+T-3,T,3);cx.fillRect(tx+T-3,ty,3,T);
      cx.fillStyle='#fff';
      cx.font='bold 16px "Press Start 2P",monospace';
      cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText('?',tx+T/2,ty+T/2+1);
      cx.textAlign='left';cx.textBaseline='alphabetic';
    }
  } else if(tl.t==='s'){
    cx.fillStyle=C.gs;cx.fillRect(tx,ty,T,T);
    cx.fillStyle=C.gd;cx.fillRect(tx,ty,T,4);cx.fillRect(tx+T-4,ty,4,T);
    cx.fillStyle=C.gt;cx.fillRect(tx,ty,T,3);
  } else if(tl.t==='p'||tl.t==='ps'){
    // pipe left half
    const isTop=tl.t==='p';
    cx.fillStyle=C.pgd;cx.fillRect(tx,ty,T,T);
    cx.fillStyle=C.pg;cx.fillRect(tx,ty,T-4,T);
    cx.fillStyle=C.pgl;cx.fillRect(tx+3,ty,4,T);
    if(isTop){
      cx.fillStyle=C.pgd;cx.fillRect(tx-4,ty,T+4,8);
      cx.fillStyle=C.pg;cx.fillRect(tx-4,ty,T,8);
      cx.fillStyle=C.pgl;cx.fillRect(tx-1,ty+1,4,6);
    }
  } else if(tl.t==='P'||tl.t==='Ps'){
    const isTop=tl.t==='P';
    cx.fillStyle=C.pgd;cx.fillRect(tx,ty,T,T);
    cx.fillStyle=C.pg;cx.fillRect(tx+4,ty,T-4,T);
    cx.fillStyle=C.pgl;cx.fillRect(tx+T-7,ty,4,T);
    if(isTop){
      cx.fillStyle=C.pgd;cx.fillRect(tx,ty,T+4,8);
      cx.fillStyle=C.pgl;cx.fillRect(tx+T-3,ty+1,4,6);
    }
  }
}

/* ── FREE COIN ── */
function drawFreeCoin(fc){
  const pulse=Math.sin(fc.anim)*0.28+0.72;
  const fw=Math.max(4,Math.floor(fc.w*pulse));
  const fx=Math.floor(fc.x+(fc.w-fw)/2);
  const fy=Math.floor(fc.y);
  cx.fillStyle=C.co;cx.fillRect(fx,fy,fw,fc.h);
  cx.fillStyle=C.cos;cx.fillRect(fx+2,fy+2,Math.max(2,fw-6),8);
}

/* ── MUSHROOM ── */
function drawMushroom(mx,my){
  const px=Math.floor(mx),py=Math.floor(my);
  cx.fillStyle=C.mb;cx.fillRect(px+4,py+14,18,12);
  cx.fillStyle=C.mr;cx.fillRect(px,py,26,16);
  cx.fillStyle=C.ms;cx.fillRect(px+3,py+2,7,7);cx.fillRect(px+15,py+2,7,7);cx.fillRect(px+9,py+7,5,5);
  cx.fillStyle='rgba(0,0,0,.2)';cx.fillRect(px,py+14,26,2);
}

/* ── PLAYER ── */
function drawPlayer(){
  const px=Math.floor(player.x), py=Math.floor(player.y);
  const fl=player.dir===-1;
  cx.save();
  if(fl){cx.translate(px+player.w,py);cx.scale(-1,1);}
  else cx.translate(px,py);

  if(player.inv>0&&Math.floor(player.inv/5)%2===1) cx.globalAlpha=0.45;

  const big=player.big;
  const w=player.w, h=player.h;

  // Hat
  cx.fillStyle=C.ph;cx.fillRect(5,0,w-10,big?10:7);
  cx.fillRect(2,big?8:5,w-4,3);
  // Head
  cx.fillStyle=C.pf;cx.fillRect(2,big?9:7,w-4,big?12:10);
  // Eyes & mustache
  cx.fillStyle='#000';
  cx.fillRect(big?9:6,big?12:10,3,3);
  cx.fillRect(big?16:13,big?12:10,3,3);
  cx.fillRect(big?6:4,big?17:14,big?14:10,2);
  // Overalls body
  cx.fillStyle=C.pr;cx.fillRect(1,big?21:17,w-2,big?14:9);
  cx.fillStyle=C.pp;cx.fillRect(0,big?35:26,w,big?10:7);
  // Buttons
  cx.fillStyle=C.pf;cx.fillRect(5,big?37:28,4,4);cx.fillRect(w-9,big?37:28,4,4);
  // Shoes
  cx.fillStyle=C.ps;
  cx.fillRect(0,big?45:33,13,big?5:4);
  cx.fillRect(w-13,big?45:33,13,big?5:4);

  cx.globalAlpha=1;
  cx.restore();
}

/* ── ENEMY ── */
function drawEnemy(e){
  const px=Math.floor(e.x),py=Math.floor(e.y);
  cx.save();cx.translate(px,py);

  if(e.squish){
    cx.fillStyle=C.gb;cx.fillRect(0,e.h-6,e.w,6);
    cx.restore();return;
  }

  if(e.t==='G'){
    // feet
    cx.fillStyle=C.gbd;cx.fillRect(0,e.h-7,9,7);cx.fillRect(e.w-9,e.h-7,9,7);
    // body
    cx.fillStyle=C.gb;cx.fillRect(2,6,e.w-4,e.h-9);
    // head
    cx.fillRect(0,0,e.w,10);
    // face
    cx.fillStyle=C.gf;cx.fillRect(3,7,7,8);cx.fillRect(e.w-10,7,7,8);
    cx.fillStyle='#000';cx.fillRect(5,10,3,3);cx.fillRect(e.w-8,10,3,3);
    // angry brows
    cx.fillStyle='#000';
    cx.fillRect(3,5,8,2);cx.fillRect(e.w-11,5,8,2);
  } else {
    // KOOPA
    cx.fillStyle=C.ksl;cx.fillRect(4,8,e.w-8,e.h-8);
    cx.fillStyle=C.ks;cx.fillRect(6,10,e.w-12,e.h-14);
    // hexagonal shell pattern
    cx.fillStyle='rgba(0,80,0,.25)';
    cx.fillRect(9,13,4,4);cx.fillRect(14,16,4,4);cx.fillRect(9,19,4,4);
    // head
    const hf=e.vx<0?0:e.w-10;
    cx.fillStyle=C.kf;cx.fillRect(hf,1,10,10);
    cx.fillStyle='#000';cx.fillRect(hf+(e.vx<0?2:5),4,3,3);
    // teeth
    cx.fillStyle='#fff';cx.fillRect(hf+(e.vx<0?1:3),10,4,4);cx.fillRect(hf+(e.vx<0?6:8),10,3,4);
    // feet
    cx.fillStyle=C.ks;cx.fillRect(0,e.h-6,9,6);cx.fillRect(e.w-9,e.h-6,9,6);
  }
  cx.restore();
}

/* ── FLAG ── */
function drawFlag(){
  if(!flagX) return;
  const poleTop=11*T-9*T;
  cx.fillStyle=C.fp;cx.fillRect(Math.floor(flagX),poleTop,6,9*T);
  cx.fillStyle=C.ffl;cx.fillRect(Math.floor(flagX)+6,poleTop,24,16);
  cx.fillStyle='#fff';
  cx.beginPath();cx.arc(Math.floor(flagX)+3,poleTop,5,0,Math.PI*2);cx.fill();
}

/* ═══════════════════════════════════════════════
   HUD UPDATE
═══════════════════════════════════════════════ */
function updateHUD(){
  document.getElementById('hSkor').textContent=String(score).padStart(6,'0');
  document.getElementById('hKoin').textContent='🪙 '+String(coins_).padStart(2,'0');
  document.getElementById('hDunia').textContent=(lvIdx+1)+'‑1';
  document.getElementById('hWaktu').textContent=timer_;
  document.getElementById('hNyawa').textContent='🍄 × '+lives;
}

/* ═══════════════════════════════════════════════
   TIMER
═══════════════════════════════════════════════ */
function startTimer(){
  clearInterval(timerTick);
  timerTick=setInterval(()=>{
    if(gState!=='play') return;
    timer_--;
    if(timer_<=100) document.getElementById('hWaktu').style.color='#f44';
    else document.getElementById('hWaktu').style.color='#ffd700';
    if(timer_<=0){timer_=0;killPlayer();}
  },1000);
}

/* ═══════════════════════════════════════════════
   FLASH LEVEL
═══════════════════════════════════════════════ */
function flashLevel(){
  // short message shown on HUD world field
  const el=document.getElementById('hDunia');
  const orig=el.textContent;
  el.textContent='DUNIA '+(lvIdx+1);
  el.style.color='#f84';
  setTimeout(()=>{el.textContent=orig;el.style.color='#ffd700';},1800);
}

/* ═══════════════════════════════════════════════
   SCREEN MANAGEMENT
═══════════════════════════════════════════════ */
function hideAll(){
  ['ovStart','ovPause','ovOver','ovClear','ovWin'].forEach(id=>{
    document.getElementById(id).classList.add('hide');
  });
}
function showOv(id){ hideAll(); document.getElementById(id).classList.remove('hide'); }

function endGame(type){
  gState=type;
  clearInterval(timerTick);
  if(type==='over'){
    document.getElementById('goScore').textContent='SKOR: '+score;
    showOv('ovOver');
  } else if(type==='clear'){
    document.getElementById('lcScore').textContent='SKOR: '+score;
    showOv('ovClear');
  } else if(type==='win'){
    document.getElementById('winScore').textContent='SKOR TOTAL: '+score;
    showOv('ovWin');
  }
}

function startGame(){
  score=0;coins_=0;lives=3;lvIdx=0;
  hideAll();
  initLevel(); gState='play';
  document.getElementById('hWaktu').style.color='#ffd700';
  startTimer(); flashLevel();
  if(!raf) loop();
}
function restartGame(){
  score=0;coins_=0;lives=3;lvIdx=0;
  hideAll();
  initLevel(); gState='play';
  document.getElementById('hWaktu').style.color='#ffd700';
  startTimer(); flashLevel();
}
function nextLevel(){
  lvIdx++;
  hideAll();
  initLevel(); gState='play';
  document.getElementById('hWaktu').style.color='#ffd700';
  startTimer(); flashLevel();
}
function togglePause(){
  if(gState==='play'){gState='pause';showOv('ovPause');clearInterval(timerTick);}
  else if(gState==='pause'){gState='play';hideAll();startTimer();}
}

/* ═══════════════════════════════════════════════
   INPUT – KEYBOARD
═══════════════════════════════════════════════ */
function doJump(){
  if(gState!=='play'||!player||player.dead) return;
  if(player.onGround){player.vy=JFORCE;player.onGround=false;}
}
document.addEventListener('keydown',e=>{
  const stop=['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space','KeyZ','KeyW','KeyA','KeyD'];
  if(stop.includes(e.code)) e.preventDefault();
  if(e.code==='ArrowLeft'||e.code==='KeyA') keys.l=true;
  if(e.code==='ArrowRight'||e.code==='KeyD') keys.r=true;
  if((e.code==='ArrowUp'||e.code==='KeyW'||e.code==='Space'||e.code==='KeyZ')&&!jumpConsumed){
    jumpConsumed=true; doJump();
  }
  if(e.code==='Escape'||e.code==='KeyP') togglePause();
});
document.addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA') keys.l=false;
  if(e.code==='ArrowRight'||e.code==='KeyD') keys.r=false;
  if(e.code==='ArrowUp'||e.code==='KeyW'||e.code==='Space'||e.code==='KeyZ') jumpConsumed=false;
});

/* ═══════════════════════════════════════════════
   INPUT – MOBILE TOUCH
═══════════════════════════════════════════════ */
function mb(id,pressKey,val){
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.preventDefault();if(pressKey)keys[pressKey]=val!==undefined?val:true;el.classList.add('on');},{ passive:false });
  el.addEventListener('touchend',e=>{e.preventDefault();if(pressKey)keys[pressKey]=false;el.classList.remove('on');},{ passive:false });
}
mb('cL','l'); mb('cR','r'); mb('cDown','d');
const jBtn=document.getElementById('cJump');
jBtn.addEventListener('touchstart',e=>{e.preventDefault();jBtn.classList.add('on');doJump();},{passive:false});
jBtn.addEventListener('touchend',e=>{e.preventDefault();jBtn.classList.remove('on');},{passive:false});

/* ═══════════════════════════════════════════════
   BUTTON WIRING
═══════════════════════════════════════════════ */
document.getElementById('btnStart').addEventListener('click',startGame);
document.getElementById('btnResume').addEventListener('click',togglePause);
document.getElementById('btnRestart1').addEventListener('click',restartGame);
document.getElementById('btnRestart2').addEventListener('click',restartGame);
document.getElementById('btnRestart3').addEventListener('click',restartGame);
document.getElementById('btnNext').addEventListener('click',nextLevel);

/* ═══════════════════════════════════════════════
   START RENDER LOOP (idle until game starts)
═══════════════════════════════════════════════ */
// Minimal idle draw on start screen
(function idleDraw(){
  requestAnimationFrame(idleDraw);
  if(gState!=='start') return;
  cx.fillStyle='#5C94FC';cx.fillRect(0,0,W,H);
  cx.fillStyle='rgba(0,0,0,0)'; // just keep canvas warm
})();

loop();
</script>
